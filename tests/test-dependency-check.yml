name: Test dependency check passes
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Run the action with missing pr_number so it fails at the precheck step
      # (not the dependency validation step). This confirms all required tools
      # (gh, jq, curl, git, python3) are present in the runner environment
      # when the action reaches the precheck step.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: http://localhost:11434
          ai_model: test-model
          repo: owner/repo
          # pr_number intentionally omitted — action should fail at precheck

      - name: Assert action failed (missing pr_number)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail because PR_NUMBER is missing (precheck step)
          # or because a required tool is not available (dependency check step).
          # Either way, the outcome should be 'failure'.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when pr_number is missing, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when pr_number is missing"

      - name: Verify core tools are available in the runner
        run: |
          echo "Checking core runtime dependencies..."
          for tool in jq curl git python3; do
            if command -v "$tool" > /dev/null 2>&1; then
              echo "PASS: $tool is available"
            else
              echo "FAIL: $tool is not available"
              exit 1
            fi
          done
          echo "PASS: all core tools are available"
