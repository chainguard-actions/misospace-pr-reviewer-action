name: Test force_review bypasses skip guard
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/42/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with force_review=true (expect failure at AI call, not at precheck skip)
        id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          repo: owner/repo
          pr_number: "42"
          ai_base_url: http://localhost:9999
          ai_model: test-model
          force_review: "true"
          skip_if_diff_unchanged: "true"

      - name: Assert action failed (attempted review, not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With force_review=true, the precheck sets should_review=true and the
          # action proceeds to the AI call which fails — that is the expected path.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real GitHub/AI access), got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected (force_review bypassed skip guard)"
