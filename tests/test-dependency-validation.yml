name: Test runtime dependency validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with fake inputs (expect failure — no real GitHub/AI access)
        id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          repo: owner/repo
          pr_number: "999"
          ai_base_url: http://localhost:9999
          ai_model: test-model

      - name: Assert action failed as expected
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because it has no real GitHub token or AI endpoint.
          # A failure here means the action ran and exited non-zero — which is correct.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real GitHub/AI access), got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected"
