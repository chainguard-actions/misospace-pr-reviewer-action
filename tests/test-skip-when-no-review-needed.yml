name: Test action skips review when should_review is false
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Verify that the should_review output is produced by the precheck step.
      # With a fake token and no real PR, the action will fail at precheck
      # (can't authenticate to GitHub API). We verify the action fails at
      # the expected point and not at dependency validation.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: https://api.example.com/v1
          ai_model: test-model
          repo: octocat/Hello-World
          pr_number: "1"
          skip_if_diff_unchanged: "false"
          force_review: "false"

      - name: Assert action outcome
        env:
          OUTCOME: ${{ steps.action.outcome }}
          SHOULD_REVIEW: ${{ steps.action.outputs.should_review }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "should_review output: $SHOULD_REVIEW"
          # The action should fail because the fake token can't authenticate.
          # This confirms the action ran and attempted the precheck.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when using fake credentials (no real GitHub API access)"
