name: Test missing PR number causes precheck failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # When pr_number and repo are not provided and there is no pull_request
      # event context, the precheck script should exit 1 with
      # "Missing REPO or PR_NUMBER". The action step should fail.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: https://api.example.com/v1
          ai_model: gpt-4o
          # repo and pr_number intentionally omitted — no pull_request event context

      - name: Assert action failed due to missing PR number
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when pr_number is missing, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when PR number was not provided"
