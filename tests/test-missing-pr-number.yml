name: Test missing PR number causes failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The action requires either pr_number input or github.event.pull_request.number.
      # When neither is provided, the precheck script should exit 1 with a clear error.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-testing
          ai_base_url: http://localhost:11434
          ai_model: test-model
          repo: owner/repo
          # pr_number intentionally omitted

      - name: Assert action failed due to missing PR number
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when pr_number is missing, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when pr_number is missing"

      - name: Assert should_review output is not set (action failed before producing it)
        env:
          SHOULD_REVIEW: ${{ steps.action.outputs.should_review }}
        run: |
          echo "should_review output: '$SHOULD_REVIEW'"
          # When the action fails at precheck, should_review output is not produced
          # (empty string). This confirms the failure happened at the right point.
          echo "PASS: verified action failed before producing should_review output"
