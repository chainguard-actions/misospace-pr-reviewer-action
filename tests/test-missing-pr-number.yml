name: Test missing PR number fails gracefully
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with missing PR number (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-testing
          ai_base_url: https://api.example.com/v1
          ai_model: gpt-4o
          # Intentionally omit pr_number so PR_NUMBER env var is empty.
          # On workflow_dispatch there is no pull_request event, so
          # github.event.pull_request.number is also empty.
          # The precheck script exits 1 with "Missing REPO or PR_NUMBER".

      - name: Assert action failed due to missing PR number
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when PR_NUMBER is missing, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when PR_NUMBER was not provided"
