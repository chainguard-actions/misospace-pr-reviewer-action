name: Test missing PR number fails gracefully
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action without PR number (expect failure at precheck)
        id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: http://localhost:9999
          ai_model: test-model
          # pr_number intentionally omitted — precheck should exit 1 with
          # "Missing REPO or PR_NUMBER"

      - name: Assert action failed due to missing PR number
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when PR number is missing, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when PR number was missing"
