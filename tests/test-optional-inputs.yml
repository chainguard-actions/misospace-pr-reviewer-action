name: Test optional inputs are accepted
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install gh CLI if not already present (act containers may not include it)
      - name: Install gh CLI if missing
        run: |
          if ! command -v gh > /dev/null 2>&1; then
            echo "gh not found, installing..."
            type -p curl >/dev/null || (apt-get update && apt-get install curl -y)
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            apt-get update
            apt-get install gh -y
            echo "gh installed: $(gh --version | head -1)"
          else
            echo "gh already present: $(gh --version | head -1)"
          fi

      # Invoke the action with many optional inputs set to non-default values.
      # The action will fail at the precheck step (no PR number), but the
      # important thing is that the action accepts all these inputs without
      # crashing at the composite action input-parsing stage.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: http://localhost:11434
          ai_model: test-model
          ai_api_format: openai
          ai_max_tokens: "4096"
          ai_temperature: "0.2"
          ai_response_format: "off"
          ai_tokens_param: max_tokens
          on_model_failure: notice
          verdict_policy: findings_severity_gated
          publish_mode: comment
          publish_review_comment: "false"
          allow_approve: "false"
          force_review: "false"
          skip_if_diff_unchanged: "true"
          review_scope: auto
          context_limit_mode: normal
          tool_mode: "off"
          ci_status_check: "false"
          inline_findings: "false"
          review_routing_mode: "off"
          # pr_number intentionally omitted — precheck will exit 1 immediately

      # The action should fail at the precheck (no PR number), not at input parsing
      - name: Assert action failed at precheck not at input parsing
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ]; then
            echo "FAIL: expected action to fail (no real PR number)"
            exit 1
          fi
          echo "PASS: action failed as expected after accepting all optional inputs"

      # Verify the diff_fingerprint output key is accessible (may be empty since action failed)
      - name: Assert diff_fingerprint output key is accessible
        env:
          FINGERPRINT: ${{ steps.action.outputs.diff_fingerprint }}
        run: |
          echo "diff_fingerprint: '$FINGERPRINT'"
          # The output may be empty since the action failed before computing it
          echo "PASS: diff_fingerprint output key is accessible"
