name: Test on_model_failure=notice input is accepted
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Test that on_model_failure=notice is a valid input value.
      # The action will fail at precheck (no real GitHub token), but the
      # input should be accepted without validation errors.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token
          ai_base_url: https://api.example.com/v1
          ai_model: gpt-4o
          repo: octocat/Hello-World
          pr_number: "42"
          on_model_failure: notice

      - name: Assert action failed at API call not at input validation
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail because of the fake token, not because
          # on_model_failure=notice is invalid. If input validation rejected
          # the value, the error would appear before the precheck step.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: on_model_failure=notice was accepted as a valid input value"
