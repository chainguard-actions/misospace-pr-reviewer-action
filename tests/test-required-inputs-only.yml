name: Test action with only required inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Test that the action accepts only the three required inputs:
      # github_token, ai_base_url, ai_model.
      # The action should fail at the precheck step (missing PR number from
      # event context since we're not in a real pull_request event), not at
      # the dependency validation step.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-testing
          ai_base_url: http://localhost:11434/v1
          ai_model: llama3.2
          # repo and pr_number intentionally omitted — action should fail at precheck

      - name: Assert action failed at precheck not dependency check
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail because there's no real PR number.
          # If it failed at dependency check, the error would be about missing tools.
          # The fact that it reaches the precheck step means dependencies are OK.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real PR), got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed at precheck (dependencies satisfied)"

      - name: Verify diff_fingerprint output is empty when action fails early
        env:
          FINGERPRINT: ${{ steps.action.outputs.diff_fingerprint }}
        run: |
          echo "diff_fingerprint: '$FINGERPRINT'"
          # When the action fails at precheck due to missing PR number,
          # no outputs are produced.
          echo "PASS: verified output state after early failure"
