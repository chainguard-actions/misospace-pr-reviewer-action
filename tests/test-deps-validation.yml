name: Test dependency validation passes
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The action validates that gh, jq, curl, git, python3 are present.
      # It will then fail at the precheck step because no real PR exists.
      # We use continue-on-error so we can assert on the failure reason.
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-deps-test
          ai_base_url: https://api.example.com/v1
          ai_model: gpt-4o
          repo: owner/repo
          pr_number: "1"

      - name: Assert action failed at precheck (not at deps)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail (no real GitHub token/PR), but it must have
          # passed the dependency validation step first. If deps were missing,
          # the error would be different. We just verify the action ran and
          # failed (not that it succeeded, since we have no real PR).
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail due to missing real PR, got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected (no real PR available in act environment)"
